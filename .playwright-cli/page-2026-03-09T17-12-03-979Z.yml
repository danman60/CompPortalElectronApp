      - generic [ref=e684]:
        - generic [ref=e686]:
          - button "What is StreamStage?" [ref=e687] [cursor=pointer]:
            - heading "What is StreamStage?" [level=3] [ref=e688]
            - img [ref=e689]
          - paragraph [ref=e691]: StreamStage is Canada's dance industry partner, combining media production, purpose-built software, and live broadcast services. With over 100 events streamed and 500+ videos produced for 50+ studios across Canada, we provide everything from multi-camera livestreaming to competition management platforms like CompSync.
        - generic [ref=e693]:
          - button "How does dance competition livestreaming work?" [ref=e694] [cursor=pointer]:
            - heading "How does dance competition livestreaming work?" [level=3] [ref=e695]
            - img [ref=e696]
          - paragraph [ref=e698]: Our livestreaming service uses professional multi-camera setups with real-time switching and broadcast-quality audio. Families and fans can watch competitions, recitals, and showcases live from any device, anywhere in the world. We handle all technical production so organizers can focus on running their event.
        - generic [ref=e700]:
          - button "What is CompSync and how much does it cost?" [ref=e701] [cursor=pointer]:
            - heading "What is CompSync and how much does it cost?" [level=3] [ref=e702]
            - img [ref=e703]
          - paragraph [ref=e705]: CompSync is our all-in-one dance competition management platform. It handles registration, scheduling, scoring, live results, and integrates directly with our livestream services. CompSync is free to use — visit compsync.net to get started.
        - generic [ref=e707]:
          - button "Do you offer video production for businesses outside of dance?" [ref=e708] [cursor=pointer]:
            - heading "Do you offer video production for businesses outside of dance?" [level=3] [ref=e709]
            - img [ref=e710]
          - paragraph [ref=e712]: Yes. We provide full-stack video production for any business — hybrid event production, social media content for Instagram, TikTok, and YouTube, brand and promotional videos, and end-to-end video strategy. Our clients include fitness studios, retail brands, theatre companies, and creative agencies across Ontario.
        - generic [ref=e714]:
          - button "What areas do you serve?" [ref=e715] [cursor=pointer]:
            - heading "What areas do you serve?" [level=3] [ref=e716]
            - img [ref=e717]
          - paragraph [ref=e719]: StreamStage serves clients across Canada, with a focus on Ontario. We regularly travel for dance competitions, recitals, and events. For business video production, we primarily serve the Greater Toronto Area and surrounding regions.
